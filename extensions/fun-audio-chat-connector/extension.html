<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Audio Chat Connector</title>
<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface:#1e1e2e;--surface2:#2a2a3e;--surface3:#333348;
  --border:#3a3a4e;--border2:#555;--text:#ddd;--text-dim:#888;
  --accent:#7c5cfc;--green:#22c55e;--red:#ef4444;--yellow:#fbbf24;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--surface);color:var(--text);display:flex;
  align-items:center;justify-content:center;min-height:100vh;
  font-size:14px;line-height:1.5;
}

/* ── Panel ── */
#hwx-fac-panel{
  width:380px;max-width:94vw;max-height:90vh;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:flex;flex-direction:column;overflow:hidden;
}

/* Header */
#hwx-fac-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
}
#hwx-fac-header-title{
  display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;
}
#hwx-fac-header-title svg{width:18px;height:18px;stroke:currentColor;}

/* Status */
#hwx-fac-status{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  border-bottom:1px solid var(--border);font-size:13px;
}
#hwx-fac-status-dot{
  width:10px;height:10px;border-radius:50%;background:#666;flex-shrink:0;
  transition:background .3s;
}
#hwx-fac-status-dot.dot-disconnected{background:#666}
#hwx-fac-status-dot.dot-connecting{background:var(--yellow);animation:pulse 1s infinite}
#hwx-fac-status-dot.dot-connected{background:var(--green)}
#hwx-fac-status-dot.dot-error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#hwx-fac-status-text{flex:1}
#hwx-fac-reconnect{
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:6px;padding:4px 12px;color:var(--text);cursor:pointer;font-size:12px;
  display:none;
}

/* VU */
#hwx-fac-vu-container{padding:8px 16px;border-bottom:1px solid var(--border)}
#hwx-fac-vu-label{font-size:11px;color:var(--text-dim);margin-bottom:4px}
#hwx-fac-vu-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
#hwx-fac-vu-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));
  border-radius:3px;transition:width .08s;
}

/* Controls */
#hwx-fac-controls{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
#hwx-fac-talk-btn{
  flex:1;padding:10px 16px;border:2px solid var(--border2);border-radius:24px;
  background:var(--surface3);color:var(--text);cursor:pointer;font-size:14px;font-weight:600;
  transition:all .15s;
}
#hwx-fac-talk-btn:hover:not(:disabled){border-color:var(--accent)}
#hwx-fac-talk-btn:disabled{opacity:.5;cursor:not-allowed}
#hwx-fac-talk-btn.recording{
  background:var(--red);border-color:var(--red);color:#fff;
  animation:pulse-record 1.2s infinite;
}
@keyframes pulse-record{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}
  50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}
}

/* Log */
#hwx-fac-log{
  flex:1;overflow-y:auto;padding:10px 16px;max-height:200px;min-height:80px;
  font-size:13px;color:var(--text-dim);word-wrap:break-word;
}
#hwx-fac-log::-webkit-scrollbar{width:4px}
#hwx-fac-log::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.log-entry{padding:3px 0}
.log-entry.user{color:var(--text)}
.log-entry.agent{color:var(--accent)}
.log-entry.system{color:var(--text-dim);font-style:italic}

/* Settings */
#hwx-fac-settings-toggle{
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  font-size:12px;padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);
}
#hwx-fac-settings-toggle:hover{color:var(--text)}
#hwx-fac-settings{padding:10px 16px;display:none;flex-direction:column;gap:8px}
#hwx-fac-settings.open{display:flex}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.setting-row label{font-size:12px;color:var(--text-dim);white-space:nowrap}
.setting-row input,.setting-row select{
  background:var(--surface3);border:1px solid var(--border2);border-radius:5px;
  padding:5px 8px;color:var(--text);font-size:12px;width:130px;
}
.setting-row input:focus,.setting-row select:focus{
  outline:none;border-color:var(--accent);
}
#hwx-fac-help{
  padding:0 16px 12px;font-size:11px;color:var(--text-dim);text-align:center;
}

/* Loading state shown before JS runs */
#hwx-fac-loading{
  display:flex;align-items:center;justify-content:center;padding:40px 20px;
  color:var(--text-dim);font-size:14px;
}
</style>
</head>
<body>

<!-- ──────────────────────────────────────────────────────────────────── -->
<!--  Panel                                                              -->
<!-- ──────────────────────────────────────────────────────────────────── -->
<div id="hwx-fac-panel">
  <!-- Header -->
  <div id="hwx-fac-header">
    <div id="hwx-fac-header-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <span>Fun Audio Chat</span>
    </div>
  </div>

  <!-- Status -->
  <div id="hwx-fac-status">
    <span id="hwx-fac-status-dot" class="dot-disconnected"></span>
    <span id="hwx-fac-status-text">Disconnected</span>
    <button id="hwx-fac-reconnect">Reconnect</button>
  </div>

  <!-- VU Meter -->
  <div id="hwx-fac-vu-container">
    <div id="hwx-fac-vu-label">Audio Level</div>
    <div id="hwx-fac-vu-bar"><div id="hwx-fac-vu-fill"></div></div>
  </div>

  <!-- Controls -->
  <div id="hwx-fac-controls">
    <button id="hwx-fac-talk-btn" disabled>🎤  Talk</button>
  </div>

  <!-- Log -->
  <div id="hwx-fac-log">
    <div id="hwx-fac-loading">Fun Audio Chat Connector loading…</div>
  </div>

  <!-- Settings Toggle -->
  <button id="hwx-fac-settings-toggle">⚙  Settings</button>

  <!-- Settings Panel -->
  <div id="hwx-fac-settings">
    <div class="setting-row">
      <label>Host</label>
      <input type="text" id="hwx-fac-host" placeholder="127.0.0.1">
    </div>
    <div class="setting-row">
      <label>Port</label>
      <input type="text" id="hwx-fac-port" placeholder="11236">
    </div>
    <div class="setting-row">
      <label>Mode</label>
      <select id="hwx-fac-mode">
        <option value="S2S">S2S</option>
        <option value="S2T">S2T</option>
        <option value="TTS-only">TTS-only</option>
      </select>
    </div>
  </div>

  <div id="hwx-fac-help">
    Connects to Fun-Audio-Chat at ws://{host}:{port}/chat
  </div>
</div>

<script>
/* ── Fun Audio Chat Connector ──────────────────────────────────────────
 * Standalone single-file HTML version. Implements full-duplex S2S voice
 * chatting via the FAC binary WebSocket protocol.
 *
 * Protocol:
 *   Byte 0: type (0x00=handshake, 0x01=audio/Opus, 0x02=text, 0x03=control)
 *   Bytes 1+: payload
 * ─────────────────────────────────────────────────────────────────────── */
(function() {
'use strict';

/* ====================================================================
 *  State & Constants
 * ==================================================================== */
const STATE = {DISCONNECTED:'disconnected',CONNECTING:'connecting',CONNECTED:'connected',ERROR:'error'};
const FT = {HANDSHAKE:0x00,AUDIO:0x01,TEXT:0x02,CONTROL:0x03};

let ws = null, connState = STATE.DISCONNECTED, reconnectTimer = null;
let mediaStream = null, mediaRecorder = null, isRecording = false;
let audioCtx = null, gainNode = null, audioQueue = [], isPlaying = false;
let analyser = null, vuInterval = null;

/* ====================================================================
 *  DOM refs
 * ==================================================================== */
const $ = id => document.getElementById(id);
const statusDot    = $('hwx-fac-status-dot');
const statusText   = $('hwx-fac-status-text');
const reconnectBtn = $('hwx-fac-reconnect');
const talkBtn      = $('hwx-fac-talk-btn');
const vuFill       = $('hwx-fac-vu-fill');
const logEl        = $('hwx-fac-log');
const settingsToggle = $('hwx-fac-settings-toggle');
const settingsPanel  = $('hwx-fac-settings');
const hostInput    = $('hwx-fac-host');
const portInput    = $('hwx-fac-port');
const modeSelect   = $('hwx-fac-mode');

/* ====================================================================
 *  Settings (localStorage)
 * ==================================================================== */
function loadS() {
  return {
    host: localStorage.getItem('hwx-fac-host') || '127.0.0.1',
    port: localStorage.getItem('hwx-fac-port') || '11236',
    mode: localStorage.getItem('hwx-fac-mode') || 'S2S',
  };
}
function saveS(s) {
  localStorage.setItem('hwx-fac-host', s.host);
  localStorage.setItem('hwx-fac-port', s.port);
  localStorage.setItem('hwx-fac-mode', s.mode);
}

/* ====================================================================
 *  UI helpers
 * ==================================================================== */
function setStatus(state, msg) {
  connState = state;
  statusDot.className = 'dot-' + state;
  statusText.textContent = msg;
  talkBtn.disabled = (state !== STATE.CONNECTED);
  reconnectBtn.style.display = (state===STATE.ERROR||state===STATE.DISCONNECTED) ? 'block' : 'none';
}

function addLog(text, type) {
  const loading = $('hwx-fac-loading');
  if (loading) loading.remove();
  const e = document.createElement('div');
  e.className = 'log-entry ' + (type||'system');
  e.textContent = text;
  logEl.appendChild(e);
  logEl.scrollTop = logEl.scrollHeight;
}

/* ====================================================================
 *  WebSocket
 * ==================================================================== */
function wsUrl() {
  const s = loadS();
  return `ws://${s.host}:${s.port}/chat`;
}

function connect() {
  if (ws && (ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING)) return;

  setStatus(STATE.CONNECTING, 'Connecting…');
  const url = wsUrl();
  addLog(`Connecting to ${url}…`, 'system');

  try { ws = new WebSocket(url); } catch(e) {
    setStatus(STATE.ERROR, 'Invalid URL');
    addLog('Error: ' + e.message, 'system');
    return;
  }
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus(STATE.CONNECTED, 'Connected');
    addLog('WebSocket connected', 'system');
    sendFrame(FT.HANDSHAKE, JSON.stringify({cmd:'hello', version:1}));
    addLog('Sent handshake', 'system');
  };

  ws.onmessage = ev => handleMsg(ev.data);

  ws.onerror = () => {
    setStatus(STATE.ERROR, 'WebSocket error');
    addLog('WebSocket error', 'system');
  };

  ws.onclose = ev => {
    if (connState===STATE.CONNECTED||connState===STATE.CONNECTING) {
      setStatus(STATE.DISCONNECTED, 'Disconnected');
      addLog(`Disconnected (code=${ev.code})`, 'system');
      stopRecording();
      scheduleReconnect();
    }
  };
}

function disconnect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  setStatus(STATE.DISCONNECTED, 'Disconnected');
  stopRecording();
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  addLog('Reconnecting in 5s…', 'system');
  reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 5000);
}

/* ====================================================================
 *  Binary framing
 * ==================================================================== */
function sendFrame(type, payload) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  let buf;
  if (typeof payload === 'string') {
    const enc = new TextEncoder().encode(payload);
    buf = new Uint8Array(1 + enc.length);
    buf[0] = type;
    buf.set(enc, 1);
  } else if (payload instanceof ArrayBuffer) {
    buf = new Uint8Array(1 + payload.byteLength);
    buf[0] = type;
    buf.set(new Uint8Array(payload), 1);
  } else { return; }
  ws.send(buf.buffer);
}

function handleMsg(data) {
  if (!(data instanceof ArrayBuffer)) {
    try {
      const json = JSON.parse(data);
      addLog('Server: ' + (json.text||json.status||data), 'agent');
    } catch(e) {
      addLog('Received: ' + data, 'system');
    }
    return;
  }

  const buf = new Uint8Array(data);
  if (buf.length === 0) return;
  const type = buf[0], payload = buf.slice(1);

  switch(type) {
    case FT.HANDSHAKE:
      try {
        const j = JSON.parse(new TextDecoder().decode(payload));
        if (j.status === 'ok') {
          addLog('Handshake accepted ✓', 'system');
          setStatus(STATE.CONNECTED, 'Connected — ready');
        } else {
          addLog('Handshake failed: ' + JSON.stringify(j), 'system');
          setStatus(STATE.ERROR, 'Handshake failed');
        }
      } catch(e) {
        addLog('Handshake parse error', 'system');
      }
      break;

    case FT.AUDIO:
      if (payload.byteLength > 0) {
        audioQueue.push(payload.buffer);
        if (!isPlaying) playNextAudio();
      }
      break;

    case FT.TEXT:
      try {
        const t = new TextDecoder().decode(payload);
        const j = JSON.parse(t);
        addLog(j.text ? `You: ${j.text}` : `Server: ${t}`, j.text ? 'user' : 'agent');
      } catch(e) {
        addLog('Server: ' + new TextDecoder().decode(payload), 'agent');
      }
      break;

    case FT.CONTROL:
      try {
        const j = JSON.parse(new TextDecoder().decode(payload));
        if (j.type==='start') addLog('Server started receiving', 'system');
        else if (j.type==='end_turn') {
          if (j.text) addLog('Agent: ' + j.text, 'agent');
          addLog('Agent turn ended', 'system');
        } else if (j.type==='stop') { addLog('Session stopped', 'system'); stopRecording(); }
      } catch(e) {}
      break;
  }
}

/* ====================================================================
 *  Audio Playback (Opus decode via AudioContext)
 * ==================================================================== */
async function playNextAudio() {
  if (audioQueue.length === 0) { isPlaying = false; return; }
  isPlaying = true;
  const opusData = audioQueue.shift();

  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const ab = await audioCtx.decodeAudioData(opusData);
    if (!gainNode) { gainNode = audioCtx.createGain(); gainNode.gain.value = 1.0; gainNode.connect(audioCtx.destination); }
    const src = audioCtx.createBufferSource();
    src.buffer = ab;
    src.connect(gainNode);
    src.onended = () => playNextAudio();
    src.start();
  } catch(e) {
    addLog('Playback error: ' + e.message, 'system');
    playNextAudio();
  }
}

/* ====================================================================
 *  Microphone Recording
 * ==================================================================== */
async function toggleRecording() {
  if (isRecording) stopRecording();
  else await startRecording();
}

async function startRecording() {
  if (connState !== STATE.CONNECTED || !ws) {
    addLog('Not connected — click Reconnect', 'system');
    return;
  }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 24000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
  } catch(e) {
    addLog('Mic access denied: ' + e.message, 'system');
    return;
  }

  sendFrame(FT.CONTROL, JSON.stringify({type:'start'}));
  addLog('Recording…', 'system');
  setupVU(mediaStream);

  const opts = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? {mimeType:'audio/webm;codecs=opus'} : {};
  try { mediaRecorder = new MediaRecorder(mediaStream, opts); } catch(e) { mediaRecorder = new MediaRecorder(mediaStream); }

  mediaRecorder.ondataavailable = ev => {
    if (ev.data.size>0 && connState===STATE.CONNECTED && ws && ws.readyState===WebSocket.OPEN)
      sendFrame(FT.AUDIO, ev.data);
  };
  mediaRecorder.start(100);
  isRecording = true;
  talkBtn.textContent = '⏹  Stop';
  talkBtn.classList.add('recording');
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream = null; }
  if (vuInterval) { clearInterval(vuInterval); vuInterval = null; }
  if (analyser) { analyser.disconnect(); analyser = null; }

  isRecording = false;
  talkBtn.textContent = '🎤  Talk';
  talkBtn.classList.remove('recording');
  vuFill.style.width = '0%';

  if (connState===STATE.CONNECTED && ws && ws.readyState===WebSocket.OPEN)
    sendFrame(FT.CONTROL, JSON.stringify({type:'end_turn', text:''}));

  addLog('Stopped', 'system');
}

function setupVU(stream) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  const bufLen = analyser.frequencyBinCount, data = new Uint8Array(bufLen);
  if (vuInterval) clearInterval(vuInterval);
  vuInterval = setInterval(() => {
    analyser.getByteFrequencyData(data);
    let sum = 0; for(let i=0;i<bufLen;i++) sum+=data[i];
    vuFill.style.width = Math.min(100, (sum/bufLen/255)*100) + '%';
  }, 80);
}

/* ====================================================================
 *  Settings binding
 * ==================================================================== */
settingsToggle.addEventListener('click', () => settingsPanel.classList.toggle('open'));

[hostInput, portInput, modeSelect].forEach(el => {
  el.addEventListener('change', () => {
    saveS({host:hostInput.value.trim()||'127.0.0.1', port:portInput.value.trim()||'11236', mode:modeSelect.value});
    addLog('Settings saved — reconnect to apply', 'system');
  });
});

reconnectBtn.addEventListener('click', connect);
talkBtn.addEventListener('click', toggleRecording);

/* ====================================================================
 *  Init
 * ==================================================================== */
const s = loadS();
hostInput.value = s.host;
portInput.value = s.port;
modeSelect.value = s.mode;

// Clear loading indicator
const loading = $('hwx-fac-loading');
if (loading) loading.remove();

addLog('Fun Audio Chat Connector loaded', 'system');
addLog(`Server: ws://${s.host}:${s.port}/chat`, 'system');
addLog('Click "Talk" to start speaking', 'system');

// Auto-connect
connect();

})();
</script>
</body>
</html>
